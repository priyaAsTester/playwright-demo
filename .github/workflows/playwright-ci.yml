name: Playwright Tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Path to test file'
        required: true
        default: 'tests/login.spec.js'

jobs:
  test:
    name: Playwright tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node modules and Playwright cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
            node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate test data (XLSX/JSON)
        run: node utils/generate-xlsx.js

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test "${{ github.event.inputs.test_file || 'tests/login.spec.js' }}" --project=${{ matrix.browser }} --reporter=html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: reports/playwright-report

      - name: Upload test artifacts (screenshots, traces)
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: reports/test-results
